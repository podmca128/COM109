<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="darkmode.css"> <!--Link to CSS darkmode-->
    <link rel="stylesheet" href="Contact-Style.css"> <!--Link to CSS contact-->
    <link rel="icon" type="image/png" href="Elevate_Gym_Logo.png"> <!--Favicon-->
    <meta charset="UTF-8">
    <title>Contact Us</title>
</head>
<body>

<header class="site-header" style="text-align: center; padding: 20px;">
    <nav>  <!--Links to help navigate between pages of the website-->
        <a href="index.html" class="link-tabs">Home</a> 
        <a href="classes.html" class="link-tabs">Classes</a> 
        <a href="trainers.html" class="link-tabs">Personal Trainers</a> 
        <a href="membership.html" class="link-tabs">Membership</a> 
        <a href="reviewpage.html" class="link-tabs">Reviews</a>
        <a href="contact.html" class="link-tabs">Contact</a>
    </nav>
</header>

<main>
    <!-- Dark Mode Button-->
    <button onclick="darkMode()" class="dark-mode-toggle">&#127765;</button>
    <section id="contact">
        <h2 id="contactTitle">Get in Touch</h2>

        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="contact-name">Name:</label><br><br> <!--Labels what the box is for-->
                <input type="text" id="name" name="name"><br><br> <!--For the input boxes-->
                <span id="name-error" style="color:red"></span> <!--Adds colour to the error message-->
            </div>

            <div class="form-group">
                <label for="contact-email">Email:</label><br><br> 
                <input type="email" id="email" name="email"><br><br> 
                <span id="email-error" style="color:red"></span>
            </div>

            <div class="form-group">
                <label for="contact-phone">Phone Number:</label><br><br>
                <input type="tel" id="phone" name="phone"><br><br>
                <span id="phone-error" style="color:red"></span>
            </div>

            <div class="form-group">
                <label for="message">Message:</label><br><br>
                <textarea id="message" name="message"></textarea><br><br>
            </div>

            <button type="submit">Send Message</button> 
            <p id="formMessage"></p>

        </form>
    </section>

    

</main>

<footer>
    <section id="contact-info">
        <!--Links to quickly contact the number/email-->
        <h2>Our Contact Information</h2>
        Email: <a href="mailto:info@elevategym.com">info@elevategym.com</a><br>
        Phone: <a href="tel:07434 569190">07434 569190</a>
    </section>
    <p id="copyright">&copy; 2026 Elevate Gym | Train Hard. Elevate Higher.</p>
</footer>

<script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
<script src="script.js"></script>

<!--Function for dark mode-->
<script>
    // Apply darkmode on load
    document.addEventListener("DOMContentLoaded", function () {

        const toggleBtn = document.querySelector(".dark-mode-toggle");

        // Load darkmode
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            toggleBtn.textContent = "☀️"; // Sun icon
        }

        // Toggle function
        window.darkMode = function () {
            document.body.classList.toggle("dark-mode");

            const isDark = document.body.classList.contains("dark-mode");
            toggleBtn.textContent = isDark ? "☀️" : "🌕"; // Moon or sun icon
            localStorage.setItem("theme", isDark ? "dark" : "light");
        };
    });
</script>

<script src="ContactValidation.js"></script> <!--JS link for contact form validation-->

</body>
</html>
