<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="darkmode.css"> <!--Link to CSS darkmode-->
    <meta charset="UTF-8">
    <title>Contact Us</title>
</head>
<body>

<header class="site-header" style="text-align: center; padding: 20px;">
  <div class="logo" style="text-align: center;">
    <a href="index.html">
      <img src="images\Elevate_Gym_Logo.png" alt="Elevate Gym Logo" style="width: 150px; height: auto;">
    </a>
  </div>
    <!-- Dark Mode Button-->
    <button onclick="darkMode()" style="margin-right: 1000px; font-size: 16px;">&#127765;</button> 

    <h1>Contact Us</h1>
    <nav>
        <a href="index.html">Home</a> |
        <a href="classes.html">Classes</a> |
        <a href="trainers.html">Personal Trainers</a> |
        <a href="membership.html">Membership</a> |
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <section id="contact">
        <h2>Get in Touch</h2>

        <form id="contactForm" class="contact-form">

            <div class="form-group">
                <label for="name">Name:</label><br><br>
                <input type="text" id="name" name="name" required><br><br>
            </div>

            <div class="form-group">
                <label for="email">Email:</label><br><br>
                <input type="email" id="email" name="email" required><br><br>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label><br><br>
                <input type="tel" id="phone" name="phone" pattern="[0][7][0-9]{9}" required><br><br>
            </div>

            <div class="form-group">
                <label for="message">Message:</label><br><br>
                <textarea id="message" name="message" required></textarea><br><br>
            </div>

            <button type="submit">Send Message</button>
            <p id="formMessage"></p>

        </form>
    </section>

    <section id="contact-info">
        <h2>Our Contact Information</h2>
        <p>Email: info@elevategym.com</p>
        <p>Phone: 07434 569190</p>
    </section>

</main>

<footer>
    <p>&copy; 2026 Elevate Gym</p>
</footer>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="script.js"></script>

<!--Function for dark mode-->
<script>
    function darkMode() {
        var darkMode = document.body;
        darkMode.classList.toggle("dark-mode");
    }
</script>

</body>
</html>
