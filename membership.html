<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership</title>
</head>
<body>

<header class="site-header" style="text-align: center; padding: 20px;">
  <div class="logo" style="text-align: center;">
    <a href="index.html">
      <img src="Elevate_Gym_Logo.png" alt="Elevate Gym Logo" style="width: 150px; height: auto;">
    </a>
  </div>

    <h1>Membership Plans</h1>
    <nav>
        <a href="index.html">Home</a> |
        <a href="classes.html">Classes</a> |
        <a href="trainers.html">Personal Trainers</a> |
        <a href="membership.html">Membership</a> |
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>

    <section id="plans">
        <h2>Choose Your Plan</h2>

        <div class="plans">

            <article class="plan">
                <h3>Bronze</h3>
                <p>£22.99 per month</p>
            </article>

            <article class="plan">
                <h3>Silver</h3>
                <p>£27.99 per month</p>
            </article>

            <article class="plan">
                <h3>Gold</h3>
                <p>£32.99 per month</p>
            </article>

        </div>
    </section>

    <section id="signup">
        <h2>Sign Up</h2>

        <form class="signup-form">

            <div class="form-group">
                <label for="member-name">Name:</label><br><br>
                <input type="text" id="member-name" name="name" required><br><br>
            </div>

            <div class="form-group">
                <label for="member-email">Email:</label><br><br>
                <input type="email" id="member-email" name="email" required><br><br>
            </div>

            <div class="form-group">
                <label for="membership">Select Membership:</label><br><br>
                <select id="membership" name="membership"><br><br>
                    <option>Bronze</option>
                    <option>Silver</option>
                    <option>Gold</option>
                </select><br><br>
            </div>

            <button type="submit">Join Now</button>

        </form>
    </section>

</main>


<footer>
    <p>&copy; 2026 Elevate Gym</p>
</footer>

</body>
</html>
